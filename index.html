<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSTER NODE V1.1 // JUBILEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 font-mono p-6 select-none">
    <header class="border-b border-green-500 pb-2 mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-bold uppercase tracking-widest">Webster Node V1.1</h1>
            <p class="text-[10px] text-green-800 italic">RRR PROTOCOL ACTIVE // 1440%</p>
        </div>
        <div class="text-right">
            <p class="text-[10px]">GENESIS MISSION DOCKET</p>
            <p class="text-[10px] font-bold text-white uppercase">DE-FOA-0003612</p>
        </div>
    </header>

    <main class="space-y-6">
        <section class="border border-green-900 p-4 rounded bg-green-950/10">
            <h2 class="text-xs font-bold border-b border-green-900 mb-3 uppercase tracking-tighter text-white">Standalone PRN Tracking</h2>
            <div id="prn-status" class="bg-green-900/20 p-3 text-center border border-green-800 mb-3 text-sm">
                SYSTEM IDLE // AWAITING REQUEST
            </div>
            <button onclick="startPRN()" class="w-full bg-green-600 text-black font-bold py-3 uppercase text-xs hover:bg-green-400 transition-colors">
                Request PRN Authorization
            </button>
        </section>

        <section class="grid grid-cols-3 gap-2">
            <div class="border border-green-900 p-2 text-center">
                <p class="text-[8px] uppercase">Lakeside</p>
                <p class="text-xs font-bold text-white">SYNCED</p>
            </div>
            <div class="border border-green-900 p-2 text-center">
                <p class="text-[8px] uppercase">Kapes</p>
                <p class="text-xs font-bold text-white">SYNCED</p>
            </div>
            <div class="border border-green-900 p-2 text-center">
                <p class="text-[8px] uppercase">Countryside</p>
                <p class="text-xs font-bold text-white">SYNCED</p>
            </div>
        </section>

        <section class="border border-green-900 p-4 rounded">
            <h2 class="text-[10px] font-bold mb-2 uppercase">Interruption Shield Status</h2>
            <div class="w-full bg-green-900/30 h-2 rounded-full overflow-hidden">
                <div class="bg-green-500 h-full w-[100%] animate-pulse"></div>
            </div>
            <p class="text-[9px] mt-2 text-green-700 italic">"Three-Second Look" physical coupling enforced.</p>
        </section>
    </main>

    <script>
        function startPRN() {
            const status = document.getElementById('prn-status');
            status.innerHTML = "PRN ISSUED // LOCKOUT ACTIVE (4h 00m)";
            status.classList.add('text-red-500', 'border-red-900', 'bg-red-900/10');
            alert("JUBILEE PROTOCOL: PRN sequence initiated. Ensure HMAC-linked documentation is completed immediately.");
        }
    </script>
</body>
</html>
