<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSTER NODE V1.2 // TOTALITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="logic.js"></script>
</head>
<body class="bg-black text-green-500 font-mono p-4 select-none">
    <header class="border-b-2 border-green-500 pb-2 mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold uppercase tracking-tighter text-white">Webster Node V1.2</h1>
            <p class="text-[9px] text-green-700 font-bold uppercase">Genesis Mission // DE-FOA-0003612</p>
        </div>
        <div class="text-[10px] text-right border-l border-green-900 pl-2">
            <p class="text-green-800">S.J. STADLER</p>
            <p class="text-white font-bold uppercase">1440% SYNC</p>
        </div>
    </header>
    <main class="space-y-4">
        <section class="border border-green-500 p-3 bg-green-950/20 rounded-sm shadow-[0_0_15px_rgba(34,197,94,0.1)]">
            <h2 class="text-xs font-bold text-white mb-2 uppercase tracking-widest border-b border-green-900 pb-1">Genesis Grant Ledger</h2>
            <div class="grid grid-cols-2 gap-2 text-[10px]">
                <div class="bg-black p-2 border border-green-900">
                    <p class="text-green-800">TARGET VALUE</p>
                    <p class="text-white font-bold">$293,000,000.00</p>
                </div>
                <div class="bg-black p-2 border border-green-900 text-right">
                    <p class="text-green-800">AUDIT STATE</p>
                    <p class="text-green-400 font-bold">ZERO-DRIFT</p>
                </div>
            </div>
        </section>
        <section class="border border-green-900 p-3 rounded-sm bg-black">
            <h2 class="text-xs font-bold mb-3 uppercase text-green-400">Jubilee RRR Protocol</h2>
            <div id="status-display" class="bg-green-950/40 border border-green-800 p-6 mb-4 text-center text-sm font-bold tracking-widest">
                SYSTEM STANDBY
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="triggerRRR('PRN REQUEST')" class="bg-green-600 text-black py-4 font-bold uppercase text-[10px] active:scale-95 transition-transform">PRN Request</button>
                <button onclick="triggerRRR('MED PASS')" class="border border-green-600 text-green-600 py-4 font-bold uppercase text-[10px] active:bg-green-900 transition-colors">Med Pass</button>
            </div>
        </section>
    </main>
</body>
</html>
