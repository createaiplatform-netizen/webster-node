<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WEBSTER NODE V1.5 - JUBILEE ACTIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clinical-glow { box-shadow: 0 0 15px rgba(34,197,94,0.2); }
    </style>
</head>
<body class="bg-black text-green-500 font-mono p-4">
    <header class="border-b border-green-800 pb-2 mb-6">
        <h1 class="text-white font-bold text-lg">WEBSTER NODE V1.5</h1>
        <p class="text-[10px] text-green-700 uppercase tracking-widest">Jubilee Protocol: Enabled</p>
    </header>

    <div class="space-y-6">
        <section class="border border-green-900 p-4 bg-green-950/5 rounded">
            <label class="block text-[10px] text-white uppercase mb-1">Resident Identity</label>
            <select id="res" class="w-full bg-black border border-green-800 p-3 mb-4 text-xs">
                <option>RT-001 (LAKESIDE)</option>
                <option>RT-004 (COUNTRYSIDE)</option>
            </select>

            <label class="block text-[10px] text-white uppercase mb-1">Medication Vector</label>
            <select id="med" class="w-full bg-black border border-green-800 p-3 text-xs">
                <option>AMLODIPINE 5MG</option>
                <option>LISINOPRIL 10MG</option>
                <option>TYLENOL 500MG (PRN)</option>
            </select>
        </section>

        <button onclick="executeHandshake()" class="w-full bg-green-600 text-black py-5 font-bold uppercase hover:bg-white transition-all">
            Perform Jubilee Handshake
        </button>

        <div id="log" class="text-[10px] space-y-1 pt-4 border-t border-green-900 hidden">
            <p class="text-white uppercase font-bold text-[9px] mb-2">Event Ledger:</p>
            <div id="logEntries" class="space-y-1"></div>
        </div>
    </div>

    <script>
        function executeHandshake() {
            const res = document.getElementById('res').value;
            const med = document.getElementById('med').value;
            const time = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('log');
            const entries = document.getElementById('logEntries');
            
            logDiv.classList.remove('hidden');
            const newEntry = document.createElement('p');
            newEntry.innerHTML = `<span class="text-white">[${time}]</span> AUTH: ${res} // TASK: ${med} // <span class="text-white">STATUS: RESOLVED</span>`;
            entries.prepend(newEntry);
        }
    </script>
</body>
</html>
