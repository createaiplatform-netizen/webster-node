<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSTER NODE V1.7 - LOCAL LEDGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 font-mono p-4">
    <header class="border-b border-green-800 pb-2 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-white font-bold uppercase tracking-tight">Webster Node V1.7</h1>
            <p class="text-[9px] text-green-700 uppercase font-bold">Offline Sovereign Mode</p>
        </div>
    </header>

    <main class="space-y-4">
        <section class="border border-green-900 p-4 bg-green-950/10 rounded-sm">
            <label class="block text-[8px] text-white uppercase mb-1">Resident Identity</label>
            <select id="res" class="w-full bg-black border border-green-800 text-green-500 text-xs p-3 mb-4 outline-none">
                <option value="RT-001 (LAKESIDE)">RT-001 (LAKESIDE)</option>
                <option value="RT-004 (COUNTRYSIDE)">RT-004 (COUNTRYSIDE)</option>
            </select>

            <label class="block text-[8px] text-white uppercase mb-1">Medication Vector</label>
            <select id="med" class="w-full bg-black border border-green-800 text-green-500 text-xs p-3 outline-none">
                <option value="AMLODIPINE 5MG">AMLODIPINE 5MG</option>
                <option value="LISINOPRIL 10MG">LISINOPRIL 10MG</option>
            </select>
        </section>

        <button onclick="addHandshake()" class="w-full bg-green-600 text-black py-5 font-bold uppercase text-xs active:bg-white shadow-lg">
            Record Handshake
        </button>

        <button onclick="downloadLedger()" class="w-full border border-green-800 text-green-500 py-3 font-bold uppercase text-[10px] hover:bg-green-900/20">
            Download Shift Ledger (.TXT)
        </button>

        <div id="status" class="text-[10px] text-center mt-4 uppercase tracking-tighter text-white"></div>
        
        <div id="logDisplay" class="text-[9px] mt-4 space-y-1 opacity-70">
            </div>
    </main>

    <script>
        let sessionLogs = [];

        function addHandshake() {
            const res = document.getElementById('res').value;
            const med = document.getElementById('med').value;
            const timestamp = new Date().toLocaleString();
            
            const entry = `[${timestamp}] RESIDENT: ${res} | MED: ${med} | STATUS: VERIFIED`;
            sessionLogs.push(entry);

            // Show on screen
            const logDisplay = document.getElementById('logDisplay');
            const p = document.createElement('p');
            p.innerText = entry;
            logDisplay.prepend(p);

            document.getElementById('status').innerText = "ENTRY ADDED TO LOCAL MEMORY";
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
        }

        function downloadLedger() {
            if (sessionLogs.length === 0) {
                alert("No data to download yet.");
                return;
            }
            const blob = new Blob([sessionLogs.join('\n')], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Webster_Ledger_${new Date().toLocaleDateString()}.txt`;
            a.click();
        }
    </script>
</body>
</html>
