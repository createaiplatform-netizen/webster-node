<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 font-mono p-4">
    <header class="border-b border-green-800 pb-2 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-white font-bold uppercase tracking-tight">Webster Node V1.5</h1>
            <p class="text-[9px] text-green-700 uppercase font-bold">Waiting for Ledger Bridge</p>

            <label class="block text-[8px] text-white uppercase mb-1">Medication Vector</label>
            <select id="med" class="w-full bg-black border border-green-800 text-green-500 text-xs p-3 outline-none">
                <option value="AMLODIPINE 5MG">AMLODIPINE 5MG</option>
                <option value="LISINOPRIL 10MG">LISINOPRIL 10MG</option>
            </select>
        </section>

        <button id="submitBtn" onclick="sendToSheet()" class="w-full bg-green-600 text-black py-5 font-bold uppercase text-xs active:bg-white transition-all shadow-lg">
            Execute Handshake
        </button>

        <div id="status" class="text-[10px] text-center mt-4 h-4 uppercase tracking-tighter"></div>
    </main>

        function sendToSheet() {
            if (scriptURL === 'WAITING_FOR_BRIDGE') {
                document.getElementById('status').innerText = "ERROR: BRIDGE NOT CONFIGURED";
                document.getElementById('status').style.color = "red";
                return;
            }

        }
    </script>
</body>
</html>
