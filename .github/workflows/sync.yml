name: Totality Sync
on:
  workflow_dispatch:
  push:
    paths:
      - 'execute.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Totality Update
        run: python execute.py
